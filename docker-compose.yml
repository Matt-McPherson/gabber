services:
  engine:
    depends_on:
      - livekit
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./.gabber:/app/.gabber
      - ./.secret:/app/.secret
    command: ["python", "/app/utils/start_all.py"]
    environment:
      - GABBER_SECRET_FILE=.secret
      - GABBER_REPOSITORY_DIR=.gabber
      - LIVEKIT_URL=ws://livekit:7880
      - LOCAL_LLM_HOST=host.docker.internal
      - KITTEN_TTS_HOST=kitten_tts
      - GABBER_PUBLIC_HOST=${GABBER_PUBLIC_HOST:-localhost}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - editor
          - repository

  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: ["--dev", "--bind", "0.0.0.0"]
    environment:
      - LIVEKIT_LOG_LEVEL=INFO

  frontend:
    depends_on:
      - engine
      - livekit
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REPOSITORY_HOST=repository:8001
      - GABBER_PUBLIC_HOST=${GABBER_PUBLIC_HOST:-localhost}

  kitten_tts:
    build:
      context: services/kitten-tts
      dockerfile: Dockerfile
    ports:
      - "7003:7003"
